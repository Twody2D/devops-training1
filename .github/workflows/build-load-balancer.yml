name: Build Load Balancer Images

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}


      - name: Build images
        run: |
          docker build -t twody/web1:latest ./nginx/load-balancer-demo/web1
          docker build -t twody/web2:latest ./nginx/load-balancer-demo/web2
          docker build -t twody/web3:latest ./nginx/load-balancer-demo/web3
          docker build -t twody/nginx-balancer:latest ./nginx/load-balancer-demo/balancer


      - name: Push images
        run: |
          docker push twody/web1:latest
          docker push twody/web2:latest
          docker push twody/web3:latest
          docker push twody/nginx-balancer:latest
