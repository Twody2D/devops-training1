name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-nginx ./docker

      - name: Validate docker compose
        run: docker compose -f docker/docker-compose.yml config

      - name: Check secrets
        run: |
          echo "Username length:"
          echo -n "${{ secrets.DOCKER_USERNAME }}" | wc -c
          echo "Token length:"
          echo -n "${{ secrets.DOCKER_TOKEN }}" | wc -c

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag my-nginx ${{ secrets.DOCKER_USERNAME }}/my-nginx:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-nginx:latest
