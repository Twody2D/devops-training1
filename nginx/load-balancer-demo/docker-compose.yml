services:
  web1:
    image: twody/web1:latest
    container_name: web1
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3

  web2:
    image: twody/web2:latest
    container_name: web2
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3

  web3:
    image: twody/web3:latest
    container_name: web3
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx-balancer:
    image: twody/nginx-balancer:latest
    container_name: nginx-balancer

    ports:
      - "8091:80"

    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 3s
      retries: 3

    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
