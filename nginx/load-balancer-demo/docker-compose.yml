services:
  web1:
    image: ${REGISTRY_USER}/web1:{IMAGE_TAG}
    container_name: web1
    healthcheck:
      test: ["CMD", "nginx", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3

  web2:
    image: ${REGISTRY_USER}/web2:{IMAGE_TAG}
    container_name: web2
    healthcheck:
      test: ["CMD", "nginx", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3

  web3:
    image: ${REGISTRY_USER}/web3:{IMAGE_TAG}
    container_name: web3
    healthcheck:
      test: ["CMD", "nginx", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx-balancer:
    image: ${REGISTRY_USER}/nginx-balancer:{IMAGE_TAG}
    container_name: nginx-balancer

    ports:
      - "${NGINX_PORT}:80"

    healthcheck:
      test: ["CMD", "nginx", "-f", "http://localhost"]
      interval: 10s
      timeout: 3s
      retries: 3

    depends_on:
      web1:
        condition: service_healthy
      web2:
        condition: service_healthy
      web3:
        condition: service_healthy
